# Production stack: compiled API + Next.js standalone (no source volume mounts).
# Usage: docker compose -f docker-compose.prod.yml up -d --build
#
# Required: copy and fill backend/.env (JWT, SendGrid, OAuth, LiqPay, etc.).
# Optional root .env: POSTGRES_PASSWORD, NEXT_PUBLIC_API_URL, FRONTEND__BASEURL.
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      Database__AutoMigrate: "true"
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=marketplace;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      ConnectionStrings__Redis: "redis:6379"
      Elasticsearch__Enabled: "true"
      Elasticsearch__Url: "http://elasticsearch:9200"
      Storage__Enabled: "true"
      Storage__Endpoint: "minio:9000"
      Storage__AccessKey: "${MINIO_ROOT_USER:-minioadmin}"
      Storage__SecretKey: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      Storage__Bucket: "marketplace-media"
      Storage__UseSsl: "false"
      Storage__PublicBaseUrl: "${STORAGE_PUBLIC_BASE_URL:-http://localhost:9000}"
      Storage__PresignedGetTtlMinutes: "60"
      Storage__MaxUploadBytes: "10485760"
      FRONTEND__BASEURL: "${FRONTEND__BASEURL:-http://localhost:3000}"
      OTEL_SERVICE_NAME: marketplace-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      OpenTelemetry__EnableLegacyPrometheusEndpoint: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - marketplace

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080}"
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_started
    networks:
      - marketplace

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: marketplace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - marketplace

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      logger.level: warn
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    networks:
      - marketplace

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/marketplace-media || true
      "
    networks:
      - marketplace

  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:0.96.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/otel-collector-config.yaml"]
    depends_on:
      - jaeger
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/otel-collector-config.yaml:ro
    networks:
      - marketplace

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - otel-collector
    networks:
      - marketplace

  jaeger:
    profiles: ["observability"]
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - marketplace

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - jaeger
    networks:
      - marketplace

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:

networks:
  marketplace:
    name: marketplace_net
    driver: bridge
