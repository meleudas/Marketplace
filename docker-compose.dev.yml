# Development stack: hot reload (dotnet watch + Next.js dev server).
# Usage: docker compose -f docker-compose.dev.yml up -d --build
#        docker compose up -d --build   (default via docker-compose.yml include)
# With Elasticsearch: docker compose -f docker-compose.dev.yml -f docker-compose.elasticsearch.yml up -d --build
# With ClickHouse:   docker compose -f docker-compose.dev.yml -f docker-compose.clickhouse.yml up -d --build
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=marketplace;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      # Enable via: ELASTICSEARCH__ENABLED=true + docker compose -f docker-compose.dev.yml -f docker-compose.elasticsearch.yml up -d
      Elasticsearch__Enabled: "${ELASTICSEARCH__ENABLED:-false}"
      Elasticsearch__Url: "http://elasticsearch:9200"
      Elasticsearch__ProductsIndex: "products-v2"
      Storage__Enabled: "true"
      Storage__Provider: "Minio"
      Storage__Endpoint: "minio:9000"
      Storage__AccessKey: "minioadmin"
      Storage__SecretKey: "minioadmin"
      Storage__Bucket: "marketplace-media"
      Storage__Region: "eu-central-1"
      Storage__UseSsl: "false"
      Storage__CreateBucketIfMissing: "true"
      Storage__PublicBaseUrl: "http://localhost:9000"
      Storage__PresignedGetTtlMinutes: "60"
      Storage__MaxUploadBytes: "10485760"
      OTEL_SERVICE_NAME: marketplace-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      OpenTelemetry__EnableLegacyPrometheusEndpoint: "false"
      # Enable via: docker compose -f docker-compose.dev.yml -f docker-compose.clickhouse.yml up -d
      ClickHouse__Enabled: "false"
    volumes:
      - ./backend/src:/src/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - marketplace

  frontend:
    profiles: ["frontend"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
    command: npm run dev:docker
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started
    networks:
      - marketplace

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - marketplace

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketplace
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/marketplace-media || true
      "
    networks:
      - marketplace

  db-seed:
    profiles: ["tools"]
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/scripts:/seed:ro
    command: >
      sh -c "psql
      postgresql://postgres:postgres@postgres:5432/marketplace
      -v ON_ERROR_STOP=1
      -f /seed/seed-test-data.sql"
    networks:
      - marketplace

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  minio_data:

networks:
  marketplace:
    name: marketplace_net
    driver: bridge
