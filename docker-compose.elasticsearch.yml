# Optional Elasticsearch product search.
#
# Standalone (HTTP :9200):
#   docker compose -f docker-compose.elasticsearch.yml up -d
#
# With local API stack:
#   set ELASTICSEARCH__ENABLED=true (root .env or shell), then:
#   docker compose -f docker-compose.dev.yml -f docker-compose.elasticsearch.yml up -d --build
#
# With production stack:
#   set ELASTICSEARCH__ENABLED=true, then:
#   docker compose -f docker-compose.prod.yml -f docker-compose.elasticsearch.yml up -d --build
#
# Wire the API to this service (docker network hostname `elasticsearch`), e.g. in backend/.env / root .env:
#   ELASTICSEARCH__ENABLED=true
#   Elasticsearch__Enabled=true
#   Elasticsearch__Url=http://elasticsearch:9200
#   Elasticsearch__ProductsIndex=products-v2
#
# Host-run API (dotnet run) can use http://localhost:9200 from appsettings.Development.json.
# Without this overlay the API uses DB fallback for catalog search (Elasticsearch__Enabled=false).

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      logger.level: warn
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - marketplace

networks:
  marketplace:
    name: marketplace_net
    driver: bridge
