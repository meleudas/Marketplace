  observability-config-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate OTEL Collector config
        run: |
          docker run --rm -v "${{ github.workspace }}/observability:/cfg" \
            otel/opentelemetry-collector-contrib:0.96.0 \
            validate --config=/cfg/otel-collector-config.yaml
      - name: Install promtool
        run: |
          curl -sL https://github.com/prometheus/prometheus/releases/download/v2.51.2/prometheus-2.51.2.linux-amd64.tar.gz | tar xz
          ./prometheus-2.51.2.linux-amd64/promtool check rules observability/prometheus-rules.yml

  sonar-analysis:
    runs-on: ubuntu-latest
    if: ${{ vars.SONAR_HOST_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner
      - name: Begin Sonar analysis
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          dotnet sonarscanner begin \
            /k:"marketplace-backend" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="test-results/**/coverage.cobertura.xml"
      - name: Restore
        run: dotnet restore backend/Marketplace.slnx
      - name: Build
        run: dotnet build backend/Marketplace.slnx -c Release
      - name: Test with coverage
        run: |
          dotnet test backend/tests/Marketplace.Tests.Unit/Marketplace.Tests.Unit.csproj -c Release --no-restore \
            /p:CollectCoverage=true \
            /p:CoverletOutput=backend/test-results/sonar-coverage/ \
            /p:CoverletOutputFormat=cobertura
          dotnet test backend/tests/Marketplace.Tests.Integration/Marketplace.Tests.Integration.csproj -c Release --no-restore \
            /p:CollectCoverage=true \
            /p:CoverletOutput=backend/test-results/sonar-coverage-integration/ \
            /p:CoverletOutputFormat=cobertura
      - name: End Sonar analysis
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
      - name: Wait for SonarQube Quality Gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          status=$(curl -s -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=marketplace-backend" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])")
          if [ "$status" != "OK" ]; then
            echo "SonarQube Quality Gate failed: $status"
            exit 1
          fi

