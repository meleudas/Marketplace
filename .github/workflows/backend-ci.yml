name: backend-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  api-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            backend/**/*.csproj
            backend/**/*.props
            backend/**/*.targets

      - name: Restore
        run: dotnet restore backend/Marketplace.slnx

      - name: Build
        run: dotnet build backend/Marketplace.slnx -c Release --no-restore

      - name: API regression suite
        run: dotnet test backend/tests/Marketplace.Tests.Unit/Marketplace.Tests.Unit.csproj -c Release --no-build --filter "Suite=API" --logger "trx;LogFileName=api-tests.trx" --results-directory backend/test-results

      - name: Upload API test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-test-results
          path: backend/test-results
          if-no-files-found: warn

  contract-compat:
