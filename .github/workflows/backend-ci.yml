      - name: Cart & checkout domain gate
        run: |
          dotnet test backend/tests/Marketplace.Tests.Unit/Marketplace.Tests.Unit.csproj -c Release --no-build --filter "Suite=CartCheckout" /p:CollectCoverage=true /p:CoverletOutput=backend/test-results/cart-coverage/ /p:CoverletOutputFormat=cobertura /p:Include="[Marketplace.API]*Cart*%2c[Marketplace.Application]*Cart*%2c[Marketplace.Application]*Carts*%2c[Marketplace.Application]*Checkout*%2c[Marketplace.Domain]*Cart*%2c[Marketplace.Infrastructure]*Cart*" /p:Threshold=14 /p:ThresholdType=line /p:ThresholdStat=total --logger "trx;LogFileName=cart-checkout-unit-tests.trx" --results-directory backend/test-results
          dotnet test backend/tests/Marketplace.Tests.Integration/Marketplace.Tests.Integration.csproj -c Release --no-build --filter "Suite=CartCheckout" --logger "trx;LogFileName=cart-checkout-integration-tests.trx" --results-directory backend/test-results
