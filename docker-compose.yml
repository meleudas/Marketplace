services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=marketplace;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      Elasticsearch__Enabled: "true"
      Elasticsearch__Url: "http://elasticsearch:9200"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    networks:
      - marketplace

  frontend:
    profiles: ["frontend"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      api:
        condition: service_started
    networks:
      - marketplace

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - marketplace

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketplace
    healthcheck: 
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      logger.level: warn
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - marketplace

  db-seed:
    profiles: ["tools"]
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/scripts:/seed:ro
    command: >
      sh -c "psql
      postgresql://postgres:postgres@postgres:5432/marketplace
      -v ON_ERROR_STOP=1
      -f /seed/seed-test-data.sql"
    networks:
      - marketplace

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  frontend_next_cache:

networks:
  marketplace:
    driver: bridge

