services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=marketplace;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      Elasticsearch__Enabled: "true"
      Elasticsearch__Url: "http://elasticsearch:9200"
      Storage__Enabled: "true"
      Storage__Endpoint: "minio:9000"
      Storage__AccessKey: "minioadmin"
      Storage__SecretKey: "minioadmin"
      Storage__Bucket: "marketplace-media"
      Storage__UseSsl: "false"
      Storage__PublicBaseUrl: "http://localhost:9000"
      Storage__PresignedGetTtlMinutes: "60"
      Storage__MaxUploadBytes: "10485760"
      OTEL_SERVICE_NAME: marketplace-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OpenTelemetry__Enabled: "${OTEL_ENABLED:-false}"
      OpenTelemetry__EnableLegacyPrometheusEndpoint: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - marketplace

  frontend:
    profiles: ["frontend"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      api:
        condition: service_started
    networks:
      - marketplace

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - marketplace

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketplace
    healthcheck: 
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      logger.level: warn
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - marketplace

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - marketplace

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/marketplace-media || true
      "
    networks:
      - marketplace

  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otelcol-contrib/otel-collector-config.yaml"]
    depends_on:
      - jaeger
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
      - "13133:13133"
    networks:
      - marketplace

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.51.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - marketplace

  jaeger:
    profiles: ["observability"]
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4319:4317"
    networks:
      - marketplace

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - jaeger
    networks:
      - marketplace

  sonarqube-db:
    profiles: ["sonar"]
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - marketplace

  sonarqube:
    profiles: ["sonar"]
    image: sonarqube:10.4-community
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9002:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - marketplace

  db-seed:
    profiles: ["tools"]
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/scripts:/seed:ro
    command: >
      sh -c "psql
      postgresql://postgres:postgres@postgres:5432/marketplace
      -v ON_ERROR_STOP=1
      -f /seed/seed-test-data.sql"
    networks:
      - marketplace

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  frontend_next_cache:
  minio_data:
  prometheus_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  # Фіксоване ім'я мережі: без нього Compose створює marketplace_marketplace, а старі
  # контейнери (postgres, redis, …) можуть лишитися на marketplace_net — тоді api не резолвить postgres.
  marketplace:
    name: marketplace_net
    driver: bridge
